version: "3.9"

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  geofusion-net:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  faiss-data:
  mlflow-data:
  prometheus-data:
  grafana-data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── Frontend Dashboard (Port 3000) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - geofusion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ── API Gateway (Port 8000) ──────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8001
      - RETRIEVAL_SERVICE_URL=http://retrieval-service:8002
      - EVAL_SERVICE_URL=http://evaluation-service:8005
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme_use_256bit_in_prod}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-60}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      - embedding-service
      - retrieval-service
    networks:
      - geofusion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Embedding Service (Port 8001) ────────────────────────────────────────
  embedding-service:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.embedding
    ports:
      - "8001:8001"
    environment:
      - MODEL_TYPE=${MODEL_TYPE:-vit}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-512}
      - CHECKPOINT_PATH=${CHECKPOINT_PATH:-}
    networks:
      - geofusion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Retrieval Service (Port 8002) ────────────────────────────────────────
  retrieval-service:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    working_dir: /app/backend/retrieval-service
    ports:
      - "8002:8002"
    environment:
      - FAISS_INDEX_PATH=/data/faiss.index
      - METADATA_DB_PATH=/data/metadata.json
      - EMBEDDING_DIM=${EMBEDDING_DIM:-512}
    volumes:
      - faiss-data:/data
    networks:
      - geofusion-net
    restart: unless-stopped

  # ── Preprocessing Service (Port 8004) ────────────────────────────────────
  preprocessing-service:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    command: uvicorn main:app --host 0.0.0.0 --port 8004
    working_dir: /app/backend/preprocessing-service
    ports:
      - "8004:8004"
    networks:
      - geofusion-net
    restart: unless-stopped

  # ── Evaluation Service (Port 8005) ───────────────────────────────────────
  evaluation-service:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    command: uvicorn main:app --host 0.0.0.0 --port 8005
    working_dir: /app/backend/evaluation-service
    ports:
      - "8005:8005"
    networks:
      - geofusion-net
    restart: unless-stopped

  # ── Training Service (Port 8003) ─────────────────────────────────────────
  # Run via profile: docker-compose --profile training up
  training-service:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    working_dir: /app/backend/training-service
    ports:
      - "8003:8003"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    profiles:
      - training
    networks:
      - geofusion-net

  # ── MLflow Tracking Server (Port 5000) ───────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns
    networks:
      - geofusion-net
    restart: unless-stopped

  # ── Prometheus (Port 9090) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - geofusion-net
    restart: unless-stopped

  # ── Grafana (Port 3001) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-geofusion_grafana}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - geofusion-net
    restart: unless-stopped
